<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GTA Business Terminal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid p-4">

  <h4 class="mb-4 text-light">💼 GTA Business Terminal</h4>

  <!-- CASH -->
  <div class="section">
    <h6>Cash Overview</h6>
    <h3 id="cash">$5,000,000</h3>

    <input id="cashInput" type="number" class="form-control mt-2" placeholder="Update Cash">
    <button onclick="updateCash()" class="btn btn-sm btn-outline-light mt-2">Update Cash</button>
  </div>

  <!-- ADD ASSET -->
  <div class="section">
    <h6>Add Asset</h6>

    <input id="assetName" class="form-control mb-2" placeholder="Asset Name">

    <select id="category" class="form-control mb-2">
      <option>Business</option>
      <option>Property</option>
    </select>

    <input id="price" type="number" class="form-control mb-2" placeholder="Price">

    <button onclick="addAsset()" class="btn btn-sm btn-outline-light">Add Asset</button>
  </div>

  <!-- ASSETS TABLE -->
  <div class="section">
    <h6>Assets</h6>
    <table class="table table-dark table-sm">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="assetTable"></tbody>
    </table>
  </div>

  <!-- ADD UPGRADE -->
  <div class="section">
    <h6>Add Upgrade</h6>

    <input id="upgradeName" class="form-control mb-2" placeholder="Upgrade Name">
    <input id="upgradeCost" type="number" class="form-control mb-2" placeholder="Cost">

    <button onclick="addUpgrade()" class="btn btn-sm btn-outline-light">Add Upgrade</button>
  </div>

  <!-- UPGRADES -->
  <div class="section">
    <h6>Upgrades</h6>
    <table class="table table-dark table-sm">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Cost</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="upgradeTable"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
